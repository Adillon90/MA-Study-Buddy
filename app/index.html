          { term: "14 grounds for license discipline", def: "(1) False license application info; (2) violating insurance laws/orders; (3) license obtained by fraud; (4) misappropriating money; (5) intentionally misrepresenting contract terms; (6) felony conviction; (7) unfair trade practice or fraud; (8) fraudulent/coercive/incompetent conduct; (9) license denied/suspended in another state; (10) forgery; (11) cheating on a licensing exam; (12) accepting business from an unlicensed person; (13) child support noncompliance; (14) state income tax noncompliance.", cite: "M.G.L. c. 175 § 162R; Outline 1.1" },
          { term: "Hearing after license denial or nonrenewal", def: "The applicant may make written demand within 30 days of the denial or nonrenewal for a hearing under Chapter 30A. Surrendering or lapsing the license does NOT stop enforcement.", cite: "M.G.L. c. 175 § 162R(b); Outline 1.1" },
          { term: "Rebating", def: "Offering anything of value not specified in the policy as an inducement to buy:premium rebates, gifts, securities, special favors. BOTH giving and receiving a rebate are prohibited.", cite: "M.G.L. c. 175 §§ 182–184; c. 176D § 3(8); Outline 1.2" },
          { term: "Unfair claims settlement practices", def: "Prohibited (when frequent enough to be a business practice): misrepresenting facts/provisions; failing to act promptly on communications; no reasonable investigation standards; refusing to pay without investigation; failing to affirm or deny coverage in a reasonable time; failing to make prompt, fair settlement when liability is reasonably clear; forcing suits by making lowball offers; failing to explain denials.", cite: "M.G.L. c. 176D § 3(9); Outline 1.2" },
          { term: "Premiums held in fiduciary capacity", def: "Premiums a producer collects are held in a fiduciary capacity:converting them is larceny. Paying commission to, or accepting business from, unlicensed persons is also prohibited.", cite: "M.G.L. c. 175 §§ 176–177; Outline 1.2" },
          { term: "Unfair discrimination", def: "Prohibited:making distinctions between individuals of the same class and equal expectation of life (or same class/hazard in A&H) in rates, benefits, or terms.", cite: "M.G.L. c. 176D § 3; Outline 1.2" },
          { term: "Privacy:c. 175I", def: "Applicants must receive a notice of information practices, may access and request correction of recorded personal information, and must receive specific reasons for adverse underwriting decisions. Investigative consumer reports require disclosure.", cite: "M.G.L. c. 175I; Outline 1.2" },
          { term: "FCRA:adverse action", def: "Fair Credit Reporting Act. If insurance is declined or rated up based on a consumer report, the insurer must notify the applicant and identify the reporting agency. If an investigative consumer report is ordered, the applicant must be notified and may request disclosure of its nature and scope.", cite: "15 USC 1681; Outline 1.3" },
          { term: "Federal felony bar:18 USC 1033", def: "Anyone convicted of a felony involving dishonesty or breach of trust is prohibited from working in the business of insurance unless they obtain written consent from an insurance regulator:the '1033 waiver.' Making false statements in insurance financial documents is also a federal crime.", cite: "18 USC 1033–1034; Outline 1.3" },
          { term: "Per-violation fines", def: "Unfair/deceptive acts (c. 176D:7): up to $1,000 per act. Violating a final cease-and-desist order (176D:10): up to $10,000 per violation. Unlisted violations (175:194): up to $500 per violation.", cite: "M.G.L. c. 176D §§ 7, 10; c. 175 § 194; Outline 1.1" },
          { term: "Guaranty Association:gag rule", def: "The Life and Health Insurance Guaranty Association protects policyholders if an insurer becomes insolvent:but producers are PROHIBITED from using its existence as a sales tool.", cite: "M.G.L. c. 175 § 146B(19); Outline 3.6" },
          { term: "Certificate of authority", def: "A company must hold a certificate of authority to transact insurance in Massachusetts. Admitted/authorized = holds one; nonadmitted = does not. Policy forms, riders, and endorsements must be filed with and approved by the Commissioner before use.", cite: "M.G.L. c. 175 §§ 4, 2B; Outline 1.2" },
        ]
      },

      // ── MODULE 2: GENERAL INSURANCE ───────────────────────────────────
      {
        id: "mod2-general",
        title: "General Insurance",
        subtitle: "Module 2 · 8% of exam · 22 cards",
        cards: [
          { term: "Pure risk vs. speculative risk", def: "Pure risk: only a chance of loss or no loss:INSURABLE. Speculative risk: chance of gain OR loss (gambling):NOT insurable.", cite: "Outline 2.1" },
          { term: "Peril", def: "The CAUSE of loss:sickness, accident, fire. Distinct from a hazard, which is a condition that increases the chance of loss.", cite: "Outline 2.1" },
          { term: "Physical hazard", def: "A tangible condition that increases the chance of loss:e.g., an icy staircase, a pre-existing heart condition.", cite: "Outline 2.1" },
          { term: "Moral hazard", def: "DISHONESTY:intentionally inflating claims, staging accidents, fraud. The motive is financial gain.", cite: "Outline 2.1" },
          { term: "Morale hazard", def: "CARELESSNESS or indifference because the loss is insured ('it's covered, why lock it'). Not dishonest:just reckless.", cite: "Outline 2.1" },
          { term: "STARR:methods of handling risk", def: "Sharing, Transfer (insurance is risk transfer), Avoidance, Retention (deductibles, self-insurance), Reduction (sprinklers, wellness programs).", cite: "Outline 2.1" },
          { term: "Elements of an insurable risk", def: "Loss must be: due to chance; definite and measurable; statistically predictable; NOT catastrophic to the insurer; part of a large homogeneous group; and the premium must be economically feasible.", cite: "Outline 2.1" },
          { term: "Law of large numbers", def: "The larger the pool of similar exposures, the more accurately losses can be predicted. The mathematical foundation of insurance.", cite: "Outline 2.1" },
          { term: "Adverse selection", def: "The tendency of higher-risk people to seek and keep insurance more than lower-risk people. Underwriting exists to fight it.", cite: "Outline 2.1" },
          { term: "Reinsurance", def: "Insurers insuring insurers:the ceding company transfers part of a risk to a reinsurer, spreading catastrophic exposure.", cite: "Outline 2.1" },
          { term: "Stock company vs. mutual company", def: "Stock: owned by stockholders; traditionally issues nonparticipating policies (no dividends to policyholders). Mutual: owned by policyholders; issues participating policies that may pay policy dividends (treated as a return of excess premium:not taxable income).", cite: "Outline 2.2" },
          { term: "Domestic / foreign / alien insurer", def: "Domestic: incorporated in this state. Foreign: incorporated in another U.S. state. Alien: incorporated outside the United States. (A Connecticut insurer is foreign in MA; a Canadian insurer is alien.)", cite: "Outline 2.2" },
          { term: "Independent agency system", def: "The producer represents several insurers and OWNS the expirations (the book of business/client relationships). Unlike exclusive/captive agents who represent only one insurer and don't own the expirations.", cite: "Outline 2.2" },
          { term: "Express authority", def: "Authority explicitly granted in the written agency contract.", cite: "Outline 2.3" },
          { term: "Implied authority", def: "Authority not written, but reasonably necessary to carry out express authority:e.g., collecting premiums, using company letterhead.", cite: "Outline 2.3" },
          { term: "Apparent authority", def: "Authority a reasonable consumer BELIEVES the agent has because the insurer allowed the appearance. The insurer can be bound even if the act exceeded actual authority.", cite: "Outline 2.3" },
          { term: "Four elements of a valid contract", def: "(1) Offer and acceptance:application is the offer, policy is acceptance. (2) Consideration:premium + statements / insurer's promise to pay. (3) Competent parties:legal age, sound mind. (4) Legal purpose:insurable interest and consent.", cite: "Outline 2.4" },
          { term: "Contract of adhesion", def: "Drafted entirely by the insurer; the applicant takes it or leaves it. Result: ambiguous language is construed AGAINST the insurer. The related doctrine of reasonable expectations protects what a buyer could fairly believe was covered.", cite: "Outline 2.4" },
          { term: "Aleatory contract", def: "An unequal exchange of values; performance depends on chance. A small premium may yield a huge claim:or nothing at all.", cite: "Outline 2.4" },
          { term: "Unilateral contract", def: "Only ONE party:the insurer:makes a legally enforceable promise. The insured's premium payments are not legally compelled.", cite: "Outline 2.4" },
          { term: "Representations vs. warranties", def: "Representations: application statements believed true to the best of the applicant's knowledge. A misrepresentation voids coverage only if MATERIAL. Warranties: statements guaranteed absolutely true:breach voids coverage even if immaterial (rare in modern A&H).", cite: "Outline 2.4" },
          { term: "Waiver vs. estoppel", def: "Waiver: the intentional surrender of a known right. Estoppel: the law preventing a party from reasserting a right it previously waived. Example: an insurer that knowingly accepts premiums on a defective application may be estopped from later denying coverage on that defect.", cite: "Outline 2.4" },
        ]
      },

      // ── MODULE 3: A&H BASICS
      {
        id: "mod3-basics",
        title: "A&H Insurance Basics",
        subtitle: "Module 3 · 11% of exam · 18 cards",
        cards: [
          { term: "Accidental means vs. accidental results", def: "Accidental means: the CAUSE of the accident must itself be accidental:stricter. Accidental results (accidental bodily injury): only the RESULT must be unexpected and accidental:broader and more favorable to the insured. Modern policies use the 'results' wording.", cite: "Outline 3.1" },
          { term: "Principal sum vs. capital sum (AD&D)", def: "Principal sum: the full death benefit paid for accidental death (or loss of both hands/feet/sight). Capital sum: a fraction of the principal sum:often 50%:paid for lesser dismemberments.", cite: "Outline 3.4" },
          { term: "Hospital indemnity policy", def: "A limited policy paying a FIXED dollar amount per day hospitalized, regardless of actual expenses incurred. Massachusetts requires a prominent notice that coverage is limited.", cite: "Outline 3.4" },
          { term: "Specified (dread) disease policy", def: "A limited policy covering only ONE named disease (e.g., cancer only). Requires MA's limited-coverage notice on the policy.", cite: "Outline 3.4" },
          { term: "Blanket insurance", def: "Covers a changing group:sports teams, bus passengers, school students:without naming individuals. No certificates of coverage issued.", cite: "Outline 3.4" },
          { term: "Health Savings Account (HSA)", def: "Requires enrollment in a qualified high-deductible health plan (HDHP). Triple tax advantage: contributions deductible, growth tax-deferred, qualified medical withdrawals tax-free. Funds roll over year to year (no use-it-or-lose-it) and are portable.", cite: "Outline 3.5" },
          { term: "Archer MSA", def: "Older vehicle; limited to self-employed individuals and employees of small employers (50 or fewer employees) paired with a high-deductible plan. Largely closed to new participants.", cite: "Outline 3.5" },
          { term: "Medical Information Bureau (MIB)", def: "A nonprofit member-insurer bureau of coded prior-application data used to deter misrepresentation. Applicant must be notified and authorize access. An insurer may NOT decline solely on MIB data.", cite: "Outline 3.7" },
          { term: "HIV testing requirements (MA)", def: "HIV testing requires the applicant's written informed consent on an approved form, with confidentiality protections. Insurers may NOT use sexual orientation in risk classification.", cite: "211 CMR 36.05; Outline 3.7" },
          { term: "Genetic information (MA)", def: "Massachusetts bars insurers from requiring genetic tests or using genetic information in accident & sickness underwriting without consent.", cite: "M.G.L. c. 175 §§ 108H, 108I; Outline 3.7" },
          { term: "Risk classification", def: "Preferred: better than average, lowest rates. Standard: average, normal rates. Substandard: higher risk:issued with a rated premium, exclusion rider, or modified benefits, or declined.", cite: "Outline 3.7" },
          { term: "Statement of continued good health", def: "Required at policy delivery when no premium was collected with the application. The insured must confirm their health hasn't changed, AND pay the first premium, for coverage to take effect.", cite: "Outline 3.6" },
          { term: "Producer report", def: "The agent's observations about the applicant:risk factors, lifestyle notes. Submitted to the insurer but NOT seen by the applicant.", cite: "Outline 3.6" },
          { term: "Replacement of A&S coverage", def: "Every application must ask whether the new policy will replace existing coverage. When replacement is involved, the agent must furnish the prescribed 'Notice to Applicant Regarding Replacement' at the time of application or before the policy is issued. A copy is left with the applicant; a signed copy is kept in the carrier's records.", cite: "211 CMR 42.08; Outline 3.8" },
          { term: "Massachusetts individual mandate", def: "Since 2006, Massachusetts adults 18+ must maintain Minimum Creditable Coverage (MCC) or face a state tax penalty, reported on Schedule HC with the MA income tax return. The MA penalty survives the repeal of the federal ACA penalty.", cite: "M.G.L. c. 111M; 956 CMR 5.00; Outline 3.8" },
          { term: "Limited policies and the MA mandate", def: "Owning only a limited accident/sickness policy:hospital indemnity, dread disease:does NOT satisfy the Massachusetts individual mandate. MCC requires comprehensive coverage meeting state standards.", cite: "956 CMR 5.00; Outline 3.8" },
          { term: "Outline of coverage", def: "Must be delivered to the applicant at application (or with policy delivery if so structured):a plain-language summary of benefits, exclusions, and renewability.", cite: "211 CMR 42.09; Outline 3.6" },
          { term: "Attending Physician Statement (APS)", def: "A detailed medical report obtained from the applicant's own doctor. Used when the application or MIB data suggests a need for more health detail than the application provides.", cite: "Outline 3.7" },
        ]
      },

      // ── MODULE 4: POLICY PROVISIONS ───────────────────────────────────
      {
        id: "mod4-provisions",
        title: "Policy Provisions",
        subtitle: "Module 4 · 8% of exam · 22 cards",
        cards: [
          { term: "Entire Contract provision", def: "The policy, endorsements, and attached papers make up the entire contract. NO change is valid unless approved by an executive officer of the insurer and endorsed on or attached to the policy. Agents CANNOT change the policy or waive any provision.", cite: "M.G.L. c. 175 § 108(3)(a)(1)" },
          { term: "Time Limit on Certain Defenses (incontestability)", def: "After 2 years from issue, ONLY FRAUDULENT misstatements can void the policy or deny a claim. Claims for losses starting after 2 years cannot be denied for a pre-existing condition unless that condition is excluded by name.", cite: "M.G.L. c. 175 § 108(3)(a)(2)" },
          { term: "Grace period:weekly premium", def: "7 days. Coverage continues in force during the grace period.", cite: "M.G.L. c. 175 § 108(3)(a)(3)" },
          { term: "Grace period:monthly premium", def: "10 days. Coverage continues in force during the grace period.", cite: "M.G.L. c. 175 § 108(3)(a)(3)" },
          { term: "Grace period:all other premium modes", def: "31 days. Coverage continues in force. MA note: if the insurer reserves the right to refuse renewal, nonrenewal notice must be mailed at least 30 days before the premium due date.", cite: "M.G.L. c. 175 § 108(3)(a)(3)" },
          { term: "Reinstatement:automatic vs. conditional receipt", def: "Premium accepted without an application = automatic reinstatement. With application + conditional receipt: reinstated on approval OR automatically on the 45th day unless the insurer disapproves in writing. Premiums accepted can be applied no more than 60 days back.", cite: "M.G.L. c. 175 § 108(3)(a)(4)" },
          { term: "Reinstatement:what's covered when", def: "Accidents: covered IMMEDIATELY after reinstatement. Sickness: covered only if it begins more than 10 days after reinstatement.", cite: "M.G.L. c. 175 § 108(3)(a)(4)" },
          { term: "Notice of Claim", def: "Written notice must reach the insurer within 20 days of the loss, or as soon as reasonably possible. For disability benefits payable for at least 2 years, the insurer may require proof of continuing disability every 6 months.", cite: "M.G.L. c. 175 § 108(3)(a)(5)" },
          { term: "Claim Forms", def: "Insurer must furnish claim forms within 15 days of receiving notice. If it fails to, the claimant satisfies the proof-of-loss requirement by submitting written proof of the occurrence, character, and extent of loss.", cite: "M.G.L. c. 175 § 108(3)(a)(6)" },
          { term: "Proof of Loss", def: "Due within 90 days. Late proof is excused if not reasonably possible, but the hard outer limit is 1 year:unless the claimant lacks legal capacity.", cite: "M.G.L. c. 175 § 108(3)(a)(7)" },
          { term: "Time of Payment of Claims", def: "Non-periodic claims (lump sums): paid IMMEDIATELY upon receipt of proof of loss. Periodic benefits (disability income): paid at least MONTHLY.", cite: "M.G.L. c. 175 § 108(3)(a)(8)" },
          { term: "Payment of Claims:facility of payment", def: "Death proceeds go to the named beneficiary; if none, to the insured's ESTATE. All other benefits to the insured. An optional facility-of-payment clause lets the insurer pay up to $1,000 to a blood or marital relative equitably entitled.", cite: "M.G.L. c. 175 § 108(3)(a)(9)" },
          { term: "Physical Examinations", def: "The insurer, AT ITS OWN EXPENSE, may examine the insured as often as reasonably required while a claim is pending.", cite: "M.G.L. c. 175 § 108(3)(a)(10)" },
          { term: "Legal Actions window", def: "No lawsuit may begin sooner than 60 days after proof of loss is filed. No lawsuit may begin more than 3 years after proof of loss was required.", cite: "M.G.L. c. 175 § 108(3)(a)(11)" },
          { term: "Change of Beneficiary", def: "The insured may change the beneficiary at any time unless the designation is IRREVOCABLE. Beneficiary consent is NOT required to change beneficiaries, surrender, or assign the policy.", cite: "M.G.L. c. 175 § 108(3)(a)(12)" },
          { term: "Free Look (Right to Examine)", def: "10 days from delivery to cancel for any reason. Surrendering the policy voids it FROM THE BEGINNING (not from cancellation date) with a FULL premium refund.", cite: "M.G.L. c. 175 § 187H; Outline 4.1" },
          { term: "Massachusetts prompt-pay rule", def: "Insurer must furnish claim forms within 15 days of notice. If the claim isn't paid within 45 days, the insurer must explain in writing:otherwise interest accrues at 1.5% per month (max 18% per year) from day 45. Does not apply to suspected-fraud investigations.", cite: "M.G.L. c. 175 § 108(4)(c); Outline 4.3" },
          { term: "Dependent coverage:age 26", def: "Family policies must cover children to age 26 regardless of student, marital, or financial status. Incapacitated adult children may remain covered beyond that if proof of incapacity is furnished within 31 days of when coverage would otherwise end.", cite: "M.G.L. c. 175 § 108(2)(a)(3); Outline 4.3" },
          { term: "Renewability hierarchy", def: "Most to least favorable to the insured: (1) Noncancelable:insurer can never cancel, refuse renewal, or raise premiums; (2) Guaranteed renewable:must renew, may raise premiums by class; (3) Conditionally renewable:may decline for reasons stated in policy; (4) Renewable at insurer's option:may decline at renewal.", cite: "Outline 4.3" },
          { term: "Change of Occupation (optional provision)", def: "More hazardous job → benefits reduced to what the premium would buy at the riskier rate. Less hazardous job → premium reduced and excess returned pro rata.", cite: "M.G.L. c. 175 § 108(3)(b)(1); Outline 4.2" },
          { term: "Illegal Occupation (optional provision)", def: "No liability where a contributing cause of the loss was the insured committing or attempting a felony, or working in an illegal occupation.", cite: "M.G.L. c. 175 § 108(3)(b)(10); Outline 4.2" },
          { term: "Pre-existing condition denials (MA)", def: "If an insurer denies a claim based on a pre-existing condition, it must send the insured documented evidence of actual treatment or observation of that condition along with the denial.", cite: "M.G.L. c. 175 § 108(2)(a)(2A); Outline 4.3" },
        ]
      },

      // ── MODULE 5: DISABILITY INCOME ───────────────────────────────────
      {
        id: "mod5-disability",
        title: "Disability Income",
        subtitle: "Module 5 · 8% of exam · 20 cards",
        cards: [
          { term: "Own occupation definition", def: "Unable to perform the duties of YOUR OWN occupation. A surgeon who can no longer operate is disabled even if she could teach. Most generous and most expensive. Often limited to an initial period (e.g., first 2 years) before converting to any-occ.", cite: "Outline 5.1" },
          { term: "Any occupation definition", def: "Unable to perform the duties of any occupation for which you are reasonably suited by education, training, and experience. Stricter than own-occ. The MA regulatory standard.", cite: "211 CMR 42.05(1)(g); Outline 5.1" },
          { term: "Presumptive disability", def: "Specified losses are presumed totally disabling:full benefits, often with the elimination period waived, even if the insured can still work. The four triggers: sight in BOTH eyes, hearing, speech, or use of TWO limbs.", cite: "Outline 5.1" },
          { term: "Physician care requirement", def: "The insured must generally be under a physician's regular care as a condition of continued benefits. This requirement is waived when further care would be of no benefit to the insured.", cite: "Outline 5.1" },
          { term: "Elimination period", def: "The waiting period between disability onset and benefit start:a 'time deductible' (30, 90, or 180 days are common). Longer elimination = lower premium. Benefits are paid in arrears: a 90-day elimination means the first check arrives around day 120.", cite: "Outline 5.2" },
          { term: "Benefit period", def: "How long disability payments continue:2 years, 5 years, to age 65. Longer benefit period = more expensive.", cite: "Outline 5.2" },
          { term: "Waiver of premium", def: "After a stated period of total disability (commonly 90 days), premiums are waived while disability continues. Usually includes a refund of premiums paid during the qualifying period once the waiver takes effect.", cite: "Outline 5.2" },
          { term: "Partial disability benefit", def: "A FLAT percentage:typically 50%:of the total disability benefit, paid for a limited time when the insured can perform some but not all duties.", cite: "Outline 5.2" },
          { term: "Residual disability benefit", def: "Pays based on the PERCENTAGE OF EARNINGS LOST:the modern, proportionate version of partial. A 40% income drop pays 40% of the benefit.", cite: "Outline 5.2" },
          { term: "COLA rider", def: "Cost-of-living adjustment rider:inflation-adjusts disability benefits DURING a claim to keep pace with rising prices.", cite: "Outline 5.2" },
          { term: "Future Increase Option (FIO)", def: "Allows the insured to buy additional disability coverage at predetermined future dates without providing evidence of good health (medical underwriting). Financial underwriting still applies.", cite: "Outline 5.2" },
          { term: "Social Insurance Supplement (SIS)", def: "Provides extra income during the period before Social Security disability kicks in or while it's denied. Reduces dollar-for-dollar once social insurance starts paying.", cite: "Outline 5.2" },
          { term: "DI benefit cap", def: "Insurers cap individual disability income benefits at approximately 60–70% of earned income:never 100%, to preserve the financial incentive to return to work.", cite: "Outline 5.3" },
          { term: "Business Overhead Expense (BOE)", def: "Reimburses a disabled business owner for OVERHEAD:rent, utilities, employee salaries. Does NOT replace the owner's personal income. Premiums are tax-deductible; benefits are taxable income.", cite: "Outline 5.5" },
          { term: "Disability Buy-Sell", def: "Funds the purchase of a totally disabled owner's business interest per the buy-sell agreement:usually a lump sum after a long elimination period (1–2 years). Business co-owners own the coverage on each other.", cite: "Outline 5.5" },
          { term: "Key Person Disability Income", def: "The BUSINESS owns, pays for, and receives benefits when an essential employee is disabled. Used to replace profits or cover the cost of a replacement while the key person recovers.", cite: "Outline 5.5" },
          { term: "Disability reducing term", def: "Pays a declining loan obligation if the borrowing business owner is disabled. Mirrors a declining loan balance.", cite: "Outline 5.5" },
          { term: "Social Security disability definition", def: "Unable to engage in any substantial gainful activity due to a physical or mental impairment expected to last at least 12 months or result in death. The STRICTEST definition:tests against any gainful work. 5-month waiting period; benefits begin with the 6th month.", cite: "Outline 5.6" },
          { term: "Workers compensation", def: "Covers occupational injury and disease on a NO-FAULT basis. The employee's EXCLUSIVE remedy against the employer. Benefits include medical care, disability income, rehabilitation, and death benefits.", cite: "M.G.L. c. 152; Outline 5.7" },
          { term: "STD vs. LTD group DI", def: "Short-Term Disability: weekly benefit, brief elimination period (0–14 days), benefit period weeks to a year. Long-Term Disability: monthly benefit, long elimination (90–180 days), benefit period years to age 65, typically 60% of salary.", cite: "Outline 5.4" },
        ]
      },

      // ── MODULE 6: HEALTH INSURANCE PLANS ─────────────────────────────
      {
        id: "mod6-health-plans",
        title: "Health Insurance Plans",
        subtitle: "Module 6 · 20% of exam · 24 cards",
        cards: [
          { term: "HMO:key characteristics", def: "Closed panel/network (must use plan providers except emergencies); prepaid fixed periodic payments; gatekeeper model (PCP coordinates all care and provides specialist referrals); preventive care emphasis. Emergency care is ALWAYS covered:no HMO may require prior authorization for emergency services.", cite: "M.G.L. c. 176G; Outline 6.2" },
          { term: "PPO:key characteristics", def: "Open panel with financial steering. In-network care costs less; out-of-network care is still covered at higher cost-sharing. Gatekeeper PPO requires PCP referrals; non-gatekeeper PPO does not. Retains indemnity features:deductibles, coinsurance.", cite: "211 CMR 51.03; Outline 6.2" },
          { term: "Blue Cross Blue Shield", def: "Service plan:contracts BOTH with subscribers and with providers. Providers agree to negotiated reimbursement and are generally paid directly by the plan. Subscriber receives service, not a reimbursement check.", cite: "M.G.L. c. 176A–B; Outline 6.2" },
          { term: "Prospective, concurrent, retrospective review", def: "Prospective review: BEFORE treatment (precertification/prior authorization). Concurrent review: DURING treatment (ongoing hospital stay monitoring). Retrospective review: AFTER treatment (auditing appropriateness).", cite: "Outline 6.3" },
          { term: "Adverse determination notice", def: "When a carrier denies, reduces, or terminates services based on medical necessity, it must issue a written adverse determination notice explaining the clinical basis and the member's appeal rights.", cite: "M.G.L. c. 176O §§ 12–14; Outline 6.3" },
          { term: "Internal grievance process (MA)", def: "One level of internal review by clinicians not involved in the original decision. Written resolution due within 30 days (clock pauses for medical records release; can extend only by mutual written agreement). Records kept 7 years. Grievance not acted on within time limits is deemed resolved IN FAVOR OF THE INSURED and immediately eligible for external review.", cite: "M.G.L. c. 176O §§ 12–13; 958 CMR 3.305; Outline 6.3" },
          { term: "48-hour automatic reversal (MA)", def: "If the treating physician certifies the denial creates an IMMEDIATE RISK OF SERIOUS HARM, the carrier must automatically reverse the adverse determination within 48 hours.", cite: "958 CMR 3.309; Outline 6.3" },
          { term: "External review:Office of Patient Protection", def: "After a final internal adverse determination, the member may request external review through the Office of Patient Protection within 4 months of the carrier's final decision. Member pays only the first $25 (waived for hardship, refunded if fully reversed, capped at $75 per plan year). The panel's decision BINDS the carrier.", cite: "M.G.L. c. 176O § 14; Outline 6.3" },
          { term: "Expedited external review", def: "Member may request expedited internal and external review simultaneously. The external panel must issue a written decision within 72 hours of receiving an expedited request.", cite: "M.G.L. c. 176O §§ 13(d), 14; Outline 6.3" },
          { term: "Newborn coverage:MA", def: "Newborns are covered IMMEDIATELY from the moment of birth:no waiting period, no underwriting. Includes medically diagnosed congenital defects, birth abnormalities, and premature birth. If a specific premium is required, notification of birth may consist simply of submitting a claim.", cite: "M.G.L. c. 175 § 47C; Outline 6.4" },
          { term: "Adopted child coverage:MA", def: "Foster child (for whom policyholder receives foster care payments): covered from the date the ADOPTION PETITION IS FILED. All other cases: covered from the DATE OF PLACEMENT by a licensed placement agency. Coverage does NOT wait for finalization of the adoption.", cite: "M.G.L. c. 175 § 47C; Outline 6.4" },
          { term: "Dependent children to age 26", def: "Policies providing dependent coverage must cover children to age 26 regardless of student, marital, or financial status. Incapacitated adult children stay covered past the limiting age if proof of incapacity is furnished within 31 days.", cite: "M.G.L. c. 175 § 108(2)(a)(3); Outline 6.4" },
          { term: "Well-child visits:MA mandate", def: "Six visits in the first year, three in the second year, then annually to age six. Plus immunizations, screenings, and blood tests.", cite: "M.G.L. c. 175 § 47C; Outline 6.4" },
          { term: "Early intervention services", def: "For children birth to age 3, must be covered with NO copayments, coinsurance, or deductibles (narrow tax-qualified-plan exception).", cite: "M.G.L. c. 175 § 47C; Outline 6.4" },
          { term: "ACA:guaranteed issue and renewability", def: "Individual and group coverage must accept every applicant during enrollment periods (PHS 2708). Coverage must be renewed at the policyholder's option (PHS 2703).", cite: "PHS Act §§ 2703, 2708; Outline 6.5" },
          { term: "ACA:preventive care", def: "Designated preventive services covered with NO cost-sharing (no copay, coinsurance, or deductible) when received in-network.", cite: "PHS Act § 2713; Outline 6.5" },
          { term: "ACA:emergency services", def: "Covered WITHOUT prior authorization and at IN-NETWORK cost-sharing even when received at out-of-network facilities.", cite: "PHS Act § 2719A(b); Outline 6.5" },
          { term: "ACA:no lifetime or annual limits on EHBs", def: "Individual and small-group plans must cover Essential Health Benefits; no lifetime or annual DOLLAR LIMITS on EHBs. Annual out-of-pocket maximums apply.", cite: "PHS Act §§ 2707, 2711; Outline 6.5" },
          { term: "Federal MHPAEA", def: "Mental Health Parity and Addiction Equity Act (2008). Plans offering mental health or substance use disorder benefits must provide them AT PARITY with medical/surgical benefits:financial requirements and treatment limitations may be no more restrictive. Parity required IF coverage is offered; coverage itself is not mandated by this federal law.", cite: "MHPAEA; Outline 6.6" },
          { term: "Massachusetts mental health coverage mandate", def: "MA goes beyond federal parity by MANDATING coverage of biologically-based mental disorders (schizophrenia, bipolar, major depression, etc.) on a nondiscriminatory basis:same terms as physical illness. Also mandates coverage for: mental disorders of rape victims; non-biologically-based mental disorders of children and adolescents under 19.", cite: "M.G.L. c. 175 § 47B; Outline 6.6" },
          { term: "Cost transparency:MA carriers", def: "Massachusetts carriers must give members REAL-TIME COST ESTIMATES via a toll-free number and website disclosing the estimated or maximum allowed amount and the member's out-of-pocket cost for proposed services.", cite: "M.G.L. c. 176O § 23; Bulletin 2013-10; Outline 6.3" },
          { term: "Insureds vs. subscribers/participants", def: "Commercial insurer customers are insureds. Service-plan (BCBS) and HMO members are subscribers or participants:because the plan contracts with providers to deliver care rather than just paying claims.", cite: "Outline 6.1" },
          { term: "HIPAA group coverage guarantees", def: "Eligibility rules can't single out individual health status; guaranteed issue in qualifying group situations; creditable coverage (prior coverage counts toward any waiting limitation); guaranteed renewability of group coverage.", cite: "HIPAA; Outline 6.2" },
          { term: "ACA:no health-status discrimination", def: "Premiums and eligibility can't be based on health status, claims history, or genetic information. Income-based Advance Premium Tax Credits for exchange coverage are available through the Massachusetts Health Connector.", cite: "PHS Act § 2705; PPACA § 1401; Outline 6.5" },
        ]
      },

      // ── MODULE 7: LARGE GROUP HEALTH ──────────────────────────────────
      {
        id: "mod7-group",
        title: "Large Group Health Insurance",
        subtitle: "Module 7 · 15% of exam · 18 cards",
        cards: [
          { term: "Master contract vs. certificate of coverage", def: "ONE master contract is issued to the group sponsor (the employer). Covered employees do NOT receive individual policies:they receive CERTIFICATES OF COVERAGE summarizing their benefits. Employees are certificate holders, not policyowners.", cite: "Outline 7.1" },
          { term: "Experience rating vs. community rating", def: "Experience rating: premiums reflect the group's own claims history:used for large groups. Community rating: everyone in a broad pool priced the same way. Massachusetts uses modified community rating for the merged individual/small-group market.", cite: "Outline 7.1" },
          { term: "COB birthday rule", def: "For dependent children of married parents, the plan of the parent whose BIRTHDAY FALLS EARLIER IN THE CALENDAR YEAR is primary:NOT the older parent. The earlier birthday, not the older age.", cite: "211 CMR 38; Outline 7.4" },
          { term: "COB:employee vs. dependent plan", def: "A plan covering the person AS AN EMPLOYEE pays primary; the plan covering them as a dependent pays secondary.", cite: "211 CMR 38; Outline 7.4" },
          { term: "No-loss no-gain (carrier change)", def: "When an employer switches group carriers, employees should be no worse off: ongoing claims transfer without new probationary periods, and deductible and coinsurance credits carry over for amounts already satisfied that year.", cite: "Outline 7.4" },
          { term: "COBRA:termination or reduced hours (18 months)", def: "Employee's termination (other than gross misconduct) or reduction in hours triggers 18 months of continuation. Premium: up to 102% of the group rate. Election period: 60 days from the later of the qualifying event or the COBRA notice. Applies to employers with 20+ employees.", cite: "COBRA; Outline 7.6" },
          { term: "COBRA:disability extension (29 months)", def: "If the beneficiary is disabled (Social Security definition) during the first 60 days of continuation, the 18-month period extends to 29 months. Premium during the extension months: up to 150% of the group rate.", cite: "COBRA; Outline 7.6" },
          { term: "COBRA:36-month events", def: "Employee's death, divorce or legal separation, the employee's Medicare entitlement, or a dependent child losing dependent status all trigger 36 months of continuation.", cite: "COBRA; Outline 7.6" },
          { term: "MA 110D:automatic 31-day extension", def: "When an insured LEAVES THE GROUP for any reason, coverage continues automatically for 31 days after leaving:unless entitled to similar benefits elsewhere. No election required.", cite: "M.G.L. c. 175 § 110D; Outline 7.4" },
          { term: "MA 110G:involuntary layoff or death (39 weeks)", def: "After an involuntary layoff or the member's DEATH, coverage for the member (or surviving spouse) and dependents continues for 39 WEEKS from ineligibility:or until they become eligible under another group plan. Never longer than their most recent period of coverage. Employer must notify them.", cite: "M.G.L. c. 175 § 110G; Outline 7.4" },
          { term: "MA 110I:divorce continuation", def: "After divorce or a separate support judgment, the former spouse remains eligible under the member's plan WITHOUT additional premium or medical examination:as if the judgment had not entered:until the REMARRIAGE OF EITHER the member or the former spouse, or as the judgment provides.", cite: "M.G.L. c. 175 § 110I; Outline 7.4" },
          { term: "MA Mini-COBRA (176J:9)", def: "Extends COBRA-parallel continuation to small groups below the federal 20-employee threshold. Coverage must be IDENTICAL to active members. No evidence of insurability required. 150% premium after month 18 (disability extension). When continuation ends, carrier must offer a conversion nongroup plan during the 180-day period ending on the expiration date. Does NOT apply to dental or vision plans.", cite: "M.G.L. c. 176J § 9; Outline 7.4" },
          { term: "Small employer definition (MA)", def: "1 to 50 eligible employees. The MA merged market combines individual and small-group coverage into one risk pool. Carriers may require groups of 5 or fewer to enroll through an intermediary or the Health Connector.", cite: "M.G.L. c. 176J § 1; 211 CMR 66.04; Outline 7.5" },
          { term: "Small-group rating:prohibited factors", def: "Carriers must offer plans to all eligible small groups. Premiums may be adjusted ONLY by enumerated factors: age (capped at 2:1 ratio) and area (factor 0.8–1.2). Health status and claims experience are PROHIBITED rating factors.", cite: "211 CMR 66.07; Outline 7.5" },
          { term: "Pregnancy Discrimination Act", def: "Employers with 15+ employees must treat pregnancy, childbirth, and related conditions the same as any other medical condition in their health plans:same benefits, same cost-sharing.", cite: "Civil Rights Act / Pregnancy Discrimination Act; Outline 7.6" },
          { term: "Medicare secondary payer:active workers 65+", def: "For active employees 65+ in employer groups of 20+ employees, the GROUP PLAN pays primary and Medicare is secondary.", cite: "Medicare Secondary Payer rules; Outline 7.6" },
          { term: "Groups must exist for a purpose other than insurance", def: "To qualify for group coverage, the group must exist primarily for employment or another purpose unrelated to buying insurance. Group coverage is governed by the law of the state where the master policy is delivered.", cite: "Outline 7.2" },
          { term: "Extension of benefits:total disability", def: "An employee who is totally disabled when the group coverage terminates continues to receive benefits for that disabling condition for a limited extension period:the disability doesn't lose coverage just because the plan ended.", cite: "Outline 7.4" },
        ]
      },

      // ── MODULE 8: DENTAL INSURANCE ────────────────────────────────────
      {
        id: "mod8-dental",
        title: "Dental Insurance",
        subtitle: "Module 8 · 2% of exam · 8 cards",
        cards: [
          { term: "Dental benefit tiers:100 / 80 / 50", def: "Diagnostic and preventive (exams, cleanings, X-rays): ~100%, deductible usually waived. Basic services (fillings, extractions, root canals): ~80% after deductible. Major services (crowns, bridges, dentures): ~50% after deductible.", cite: "Outline 8.2" },
          { term: "Annual benefit maximum", def: "Dental's signature feature:a dollar cap per person per year. The opposite of medical plans' out-of-pocket maximums.", cite: "Outline 8.2" },
          { term: "Predetermination of benefits", def: "For expensive proposed work, the dentist submits the treatment plan to the insurer BEFORE treatment; the insurer specifies what it will pay. Not a guarantee of outcome:a pre-treatment estimate that prevents surprise bills.", cite: "Outline 8.2" },
          { term: "Scheduled vs. nonscheduled dental plan", def: "Scheduled: pays FIXED DOLLAR AMOUNTS per procedure (a fee schedule). Nonscheduled (comprehensive): pays on a usual/reasonable/customary basis with coinsurance.", cite: "Outline 8.2" },
          { term: "Integrated vs. stand-alone dental deductible", def: "Integrated plan: dental deductible is COMBINED with the major medical deductible (one shared deductible). Stand-alone: dental has its own separate, usually small deductible.", cite: "Outline 8.3" },
          { term: "Adverse selection:dental plan defenses", def: "People can schedule dental work around gaining coverage. Defenses: (1) waiting/probationary periods before major services; (2) limiting enrollment to initial eligibility and open enrollment windows; (3) annual maximums and tiered coinsurance.", cite: "Outline 8.3" },
          { term: "Late enrollee penalty:dental", def: "One core adverse-selection defense: employees who don't enroll during their initial eligibility window face reduced benefits or longer waiting periods if they try to enroll later.", cite: "Outline 8.3" },
          { term: "Combination dental plan", def: "Mixes scheduled and nonscheduled approaches:scheduled (fixed) amounts for some benefit tiers, URC coinsurance for others.", cite: "Outline 8.2" },
        ]
      },

      // ── MODULE 9: SENIORS & LTC ───────────────────────────────────────
      {
        id: "mod9-medicare-ltc",
        title: "Medicare & Long-Term Care",
        subtitle: "Module 9 · 15% of exam · 28 cards",
        cards: [
          { term: "Medicare eligibility", def: "Age 65+. Also: younger people receiving Social Security disability benefits after 24 months. People with end-stage renal disease (ESRD) or ALS at any age. Administered by CMS.", cite: "Outline 9.1" },
          { term: "Part A:premium-free eligibility", def: "Premium-free Part A for those with 40 quarters (10 years) of Medicare-covered employment, or a spouse with them. Others may buy in.", cite: "Outline 9.1" },
          { term: "Part A benefit period", def: "Begins on inpatient admission; ends when the patient has been out of the hospital/SNF for 60 CONSECUTIVE DAYS. The Part A deductible applies PER BENEFIT PERIOD:not per year. A patient can pay it more than once in a year.", cite: "Outline 9.1" },
          { term: "Part A:hospital inpatient days", def: "Days 1–60: fully covered after the deductible. Days 61–90: daily coinsurance. Beyond 90: the patient draws on 60 LIFETIME RESERVE DAYS (never renewed), each with a higher daily coinsurance.", cite: "Outline 9.1" },
          { term: "Part A:skilled nursing facility (SNF)", def: "Requires a prior 3-day INPATIENT hospital stay. Days 1–20: fully covered. Days 21–100: daily coinsurance. NOTHING after day 100 per benefit period. Custodial-only care is NOT covered by Medicare.", cite: "Outline 9.1" },
          { term: "Part A:other covered services", def: "Hospice (terminally ill, electing comfort care over curative treatment); home health care; blood after the first 3 pints.", cite: "Outline 9.1" },
          { term: "Part B:basics", def: "OPTIONAL. Monthly premium (income-adjusted). After an annual deductible, Medicare pays 80% of the approved amount; the patient owes 20%:with NO OUT-OF-POCKET CAP under Original Medicare. That missing cap is the reason Medigap exists.", cite: "Outline 9.1" },
          { term: "Part B:key exclusions", def: "Most dental, vision, hearing aids, and:critically:LONG-TERM CUSTODIAL CARE. These gaps drive demand for Medigap, Medicare Advantage, and LTC insurance.", cite: "Outline 9.1" },
          { term: "Medicare Initial Enrollment Period (IEP)", def: "7 months: the 3 months BEFORE the 65th-birthday month, the birthday month, and the 3 months AFTER.", cite: "Outline 9.1" },
          { term: "Medicare Special Enrollment Period (SEP)", def: "For those who kept working with employer group coverage:8 months after that employment/coverage ends, penalty-free.", cite: "Outline 9.1" },
          { term: "Part B:late enrollment penalty", def: "Premium rises 10% for each full 12-month period of delayed enrollment. This penalty is LIFETIME:it never goes away.", cite: "Outline 9.1" },
          { term: "Part C:Medicare Advantage", def: "Private plans (mostly HMO/PPO) replacing Original Medicare's payment structure. Must cover everything Parts A and B cover (hospice stays with Original Medicare). Usually bundle Part D, often add dental/vision. Use provider networks. Annual out-of-pocket maximum included. Enrollee still pays the Part B premium.", cite: "Outline 9.1" },
          { term: "Part D:late enrollment penalty", def: "Approximately 1% per month of delayed enrollment without creditable drug coverage. The penalty is permanent and added to the monthly premium.", cite: "Outline 9.1" },
          { term: "MA Medigap:only three plans sold", def: "Massachusetts, Minnesota, and Wisconsin hold federal waivers:they do NOT use the national lettered A–N Medigap plans. The ONLY plans sold in MA are: Core, Supplement 1, and Supplement 1A.", cite: "M.G.L. c. 176K; 211 CMR 71.08; Outline 9.2" },
          { term: "MA Medigap:Core Plan", def: "The basic package: Part A hospital coinsurance (plus extended days after Medicare benefits end), Part B 20% coinsurance, hospice cost-sharing, first 3 pints of blood, and MA-mandated 60 days per calendar year of inpatient mental health care.", cite: "211 CMR 71.08; Outline 9.2" },
          { term: "MA Medigap:Supplement 1", def: "Core PLUS: Part A deductible, skilled nursing facility coinsurance, Part B deductible, foreign travel emergency, and expanded inpatient mental health (120 days per benefit period). Roughly comparable to old national Plan F.", cite: "211 CMR 71.08; Outline 9.2" },
          { term: "MA Medigap:Supplement 1A", def: "Identical to Supplement 1 EXCEPT it does NOT cover the Part B deductible. Added in 2020 because federal MACRA bars newly-eligible Medicare enrollees (on or after January 1, 2020) from buying plans that cover the Part B deductible.", cite: "211 CMR 71.08; MACRA § 401; Outline 9.2" },
          { term: "MACRA:the exam trap", def: "If a person became eligible for Medicare ON OR AFTER JANUARY 1, 2020: they may buy CORE or SUPPLEMENT 1A only (not Supplement 1, which covers the Part B deductible). If eligible BEFORE 2020: may buy Core, Supplement 1, or Supplement 1A.", cite: "MACRA § 401; 211 CMR 71.08; Outline 9.2" },
          { term: "MA Medigap:guaranteed issue, community rated", def: "No issuer may AT ANY TIME deny, condition, or price a MA Medigap policy based on age, health status, claims experience, receipt of health care, medical condition, or genetic information. MA Medigap is effectively community rated.", cite: "211 CMR 71.10(1); Outline 9.2" },
          { term: "MA Medigap:no pre-existing condition limitations", def: "MA Medigap policies may NOT contain pre-existing condition limitations or waiting periods:EVER. National materials describing 6-month pre-ex waits do NOT apply in Massachusetts.", cite: "211 CMR 71.10(2); Outline 9.2" },
          { term: "LTC benefit triggers", def: "Inability to perform 2 OF 6 Activities of Daily Living (ADLs):expected to last at least 90 days:OR severe cognitive impairment, certified by a licensed health care practitioner.", cite: "211 CMR 65.05(1); Outline 9.4" },
          { term: "The 6 ADLs", def: "Bathing, Dressing, Toileting, Transferring, Continence, Eating.", cite: "211 CMR 65.05(1); Outline 9.4" },
          { term: "LTC:MA minimum standards", def: "Elimination periods may NOT exceed 365 days. Benefits may NOT be conditioned on prior hospitalization, Medicare ineligibility, 'steady improvement,' or medical-necessity standards (with narrow exceptions). Post-claims underwriting is prohibited.", cite: "211 CMR 65.05; Outline 9.4" },
          { term: "LTC:free look (MA)", def: "The applicant may return an LTC policy within 30 DAYS of delivery for any reason. Premium refunded within 30 days of the return. The right must be prominently printed on or attached to the first page.", cite: "M.G.L. c. 176U § 3(e); Outline 9.4" },
          { term: "LTC:unintentional lapse protection (MA)", def: "No policy may be issued until the applicant designates at least one person (besides themselves) to receive lapse notices, or signs a dated written waiver declining to. No policy may lapse for nonpayment unless the carrier notifies the insured AND the designee at least 30 days before the lapse, by first-class mail. Reinstatement is available if the policyholder proves they were cognitively impaired or had lost functional capacity before the grace period expired.", cite: "211 CMR 65.10; Outline 9.4" },
          { term: "Respite care", def: "Temporary professional care that provides relief to a family caregiver. Covered under LTC policies.", cite: "211 CMR 65; Outline 9.4" },
          { term: "MassHealth exemption for LTC (MA)", def: "A permanently institutionalized person's home is protected from MassHealth liens if, when purchased, their LTC policy met 211 CMR 65 standards: at least 730 days (2 years) of nursing-facility benefits, at least $125 per day, and an elimination period of no more than 365 days.", cite: "M.G.L. c. 118E § 33; 130 CMR 515.014; Outline 9.4" },
          { term: "LTC:MA required offers", def: "Insurers must OFFER (though the buyer may decline): (1) an inflation adjustment benefit; (2) a nonforfeiture benefit (some value preserved if the policy lapses after years of premiums). Both must be offered:neither can be omitted.", cite: "211 CMR 65.06(1)–(2); Outline 9.4" },
        ]
      },

      // ── MODULE 10: FEDERAL TAX ────────────────────────────────────────
      {
        id: "mod10-tax",
        title: "Federal Tax Considerations",
        subtitle: "Module 10 · 4% of exam · 13 cards",
        cards: [
          { term: "The rule of thumb", def: "Somebody gets the tax break, but NOT both ends. Pre-tax / deducted premiums → TAXABLE benefits. After-tax / non-deducted premiums → TAX-FREE benefits.", cite: "Outline 10.1" },
          { term: "Personal disability income:tax treatment", def: "Premiums are NOT deductible (personal expense). Benefits are received INCOME-TAX-FREE. The clearest example of the rule of thumb.", cite: "Outline 10.1" },
          { term: "Personal medical expense deduction", def: "Personal medical insurance premiums count toward the itemized medical expense deduction, deductible only to the extent total unreimbursed medical expenses exceed 7.5% of AGI. Benefits (reimbursements of actual expenses) are not taxable.", cite: "Outline 10.1" },
          { term: "Employer group medical and dental:tax treatment", def: "Employer-paid premiums are DEDUCTIBLE to the employer as a business expense and are NOT taxable income to employees. Benefits are tax-free. The most tax-favored arrangement in the module.", cite: "Outline 10.2" },
          { term: "Employer-paid group disability:tax treatment", def: "Employer pays the premium → benefits are TAXABLE to the employee. Employee pays with after-tax dollars → benefits are TAX-FREE. Shared premium → benefits taxable IN PROPORTION to the employer-paid share.", cite: "Outline 10.2" },
          { term: "FICA on employer-paid disability benefits", def: "Employer-paid disability benefits are subject to Social Security/Medicare (FICA) tax during the FIRST 6 CALENDAR MONTHS after the employee last worked. After 6 months, FICA stops.", cite: "Outline 10.2" },
          { term: "LTC:cannot go through a cafeteria plan / FSA", def: "Group long-term care coverage: employer premiums deductible, excluded from employee income, qualified benefits tax-free:BUT LTC CANNOT be offered through a cafeteria plan or flexible spending account. It is the notable exception.", cite: "Outline 10.2" },
          { term: "Self-employed health insurance deduction", def: "Sole proprietors, partners, and LLC members may deduct 100% of health insurance premiums for themselves, spouses, and dependents as an ABOVE-THE-LINE deduction (no itemizing, no 7.5% floor). Limited to earned income from the business. Unavailable in months they're eligible for an employer-subsidized plan.", cite: "Outline 10.3" },
          { term: "Self-employed deduction:what it covers", def: "The 100% above-the-line deduction covers medical, dental, and tax-qualified LTC (within age-based limits). It does NOT cover disability income premiums.", cite: "Outline 10.3" },
          { term: "Key Person Disability Income:tax treatment", def: "The business owns, pays for, and receives the benefits. Premiums are NOT deductible. Benefits are received TAX-FREE.", cite: "Outline 10.4" },
          { term: "Disability Buy-Sell:tax treatment", def: "Premiums are NOT deductible. Proceeds funding the buyout are received TAX-FREE.", cite: "Outline 10.4" },
          { term: "BOE:the tax inversion / exception", def: "Business Overhead Expense is the exception to the rule. Premiums ARE DEDUCTIBLE (as a business expense). Benefits ARE TAXABLE income:but since they pay deductible overhead (rent, salaries), the net tax impact washes out.", cite: "Outline 10.4" },
          { term: "AD&D:employer group tax treatment", def: "Treated like medical/health coverage: employer premiums are deductible and excluded from employee income; benefits are generally received TAX-FREE.", cite: "Outline 10.2" },
        ]
      },

    ]; // end DECKS

    // ── Utility 
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── Flashcard Game 
    function FlashcardGame({ deck, onExit }) {
      const total = deck.cards.length;
      const [remaining, setRemaining] = useState(() => shuffle([...deck.cards]));
      const [learned, setLearned] = useState([]);
      const [review, setReview] = useState([]);
      const [flipped, setFlipped] = useState(false);

      const current = remaining[0];
      const isDone = remaining.length === 0;
      const progress = Math.round((learned.length / total) * 100);

      function respond(rating) {
        const [cur, ...rest] = remaining;
        if (rating === "got") {
          setLearned((l) => [...l, cur]);
          setRemaining(rest);
        } else if (rating === "almost") {
          setReview((r) => [...r, cur]);
          setRemaining(rest);
        } else {
          setRemaining([...rest, cur]);
        }
        setFlipped(false);
      }

      if (isDone) {
        const pct = Math.round((learned.length / total) * 100);
        return (
          <div style={{ padding: "48px 20px 32px", maxWidth: 520, margin: "0 auto", textAlign: "center" }}>
            <div style={{ fontSize: 52, marginBottom: 10 }}>
              {pct >= 90 ? "🏆" : pct >= 70 ? "👍" : "📚"}
            </div>
            <div style={{ fontFamily: "Georgia, serif", fontSize: 26, fontWeight: 700, color: C.ink, marginBottom: 8 }}>
              Round complete
            </div>
            <div style={{ fontSize: 15, color: C.inkSoft, marginBottom: 32 }}>
              <span style={{ color: C.green, fontWeight: 700 }}>{learned.length}</span> of {total} learned
              {review.length > 0 && <> · <span style={{ color: C.gold, fontWeight: 700 }}>{review.length}</span> to review</>}
            </div>
            {review.length > 0 && (
              <button onClick={() => { setRemaining(shuffle([...review])); setReview([]); setFlipped(false); }} style={{
                display: "block", width: "100%", padding: "14px",
                background: C.ink, color: "#F4F2EA", border: "none",
                borderRadius: 12, fontSize: 15, fontWeight: 600, cursor: "pointer", marginBottom: 10,
              }}>Review {review.length} cards again</button>
            )}
            <button onClick={() => { setRemaining(shuffle([...deck.cards])); setLearned([]); setReview([]); setFlipped(false); }} style={{
              display: "block", width: "100%", padding: "13px",
              background: "transparent", color: C.inkSoft, border: `1.5px solid ${C.line}`,
              borderRadius: 12, fontSize: 14.5, fontWeight: 600, cursor: "pointer", marginBottom: 10,
            }}>Start over:all {total} cards</button>
            <button onClick={onExit} style={{
              display: "block", width: "100%", padding: "13px",
              background: "transparent", color: C.inkSoft, border: `1.5px solid ${C.line}`,
              borderRadius: 12, fontSize: 14, cursor: "pointer",
            }}>← Back to decks</button>
          </div>
        );
      }

      return (
        <div style={{ padding: "20px 16px 32px", maxWidth: 560, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: C.inkSoft, marginBottom: 8 }}>
            <span>{learned.length} learned · {remaining.length} remaining</span>
            <span>{progress}%</span>
          </div>
          <div style={{ height: 5, background: C.line, borderRadius: 3, marginBottom: 22, overflow: "hidden" }}>
            <div style={{ width: `${progress}%`, height: "100%", background: C.green, borderRadius: 3, transition: "width 0.35s" }} />
          </div>

          {/* Flip card */}
          <div style={{ perspective: "1200px", marginBottom: 18, cursor: "pointer" }} onClick={() => setFlipped(f => !f)}>
            <div style={{
              position: "relative", height: 300,
              transformStyle: "preserve-3d",
              transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
              transition: "transform 0.42s ease",
            }}>
              {/* Front */}
              <div style={{
                position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
                backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
                background: C.card, border: `1px solid ${C.line}`, borderRadius: 16,
                display: "flex", flexDirection: "column", alignItems: "center",
                justifyContent: "center", padding: "28px 24px 20px",
                boxShadow: "0 2px 10px rgba(22,36,58,0.07)", textAlign: "center",
              }}>
                <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.1em", color: "#9C9890", marginBottom: 18 }}>Term</div>
                <div style={{ fontFamily: "Georgia, serif", fontSize: 21, fontWeight: 700, color: C.ink, lineHeight: 1.35 }}>{current.term}</div>
                <div style={{ marginTop: "auto", paddingTop: 18, fontSize: 12, color: "#B0ADA4" }}>tap to reveal ↓</div>
              </div>

              {/* Back */}
              <div style={{
                position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
                backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
                transform: "rotateY(180deg)",
                background: C.ink, borderRadius: 16,
                display: "flex", flexDirection: "column", padding: "22px",
                boxShadow: "0 2px 10px rgba(22,36,58,0.12)", overflowY: "auto",

            <div style={{ display: "flex", gap: 10 }}>

            </div>
          ) : (
            <div style={{ textAlign: "center", fontSize: 13, color: "#B0ADA4" }}>Tap the card, then rate yourself</div>
          )}
        </div>
      );
    }

    function ChatMode({ apiKey, systemPrompt, starters, exam }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const bottomRef = useRef(null);

      useEffect(() => {
        if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      async function send(text) {
        const t = (text || input).trim();
        if (!t || loading) return;
        const userMsg = { role: "user", content: t };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setInput("");
        setLoading(true);
        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              model: "claude-haiku-4-5-20251001",
              max_tokens: 1024,
              system: systemPrompt,
              messages: newMessages,
            }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${res.status}`);
          }
          const data = await res.json();
          const reply = data.content?.[0]?.text || "(no response)";
          setMessages(m => [...m, { role: "assistant", content: reply }]);
        } catch (e) {
          setMessages(m => [...m, { role: "assistant", content: `**Error:** ${e.message}` }]);
        } finally {
          setLoading(false);
        }
      }

      const pad = isMobile ? "16px" : "20px";

      return (
        <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
          {/* Messages */}
          <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch", padding: isMobile ? "10px 10px 6px" : "24px 20px 12px" }}>

            {messages.length === 0 && (
              <div style={{ maxWidth: 580, width: "100%", margin: "0 auto" }}>
                {/* Welcome card */}
                <div style={{
                  background: C.card, border: `1px solid ${C.line}`, borderRadius: 16,
                  padding: isMobile ? "14px 14px 14px" : "26px 26px 22px", marginBottom: isMobile ? 12 : 20,
                  boxShadow: "0 2px 12px rgba(22,36,58,0.06)", borderTop: `3px solid ${C.green}`,
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: C.greenSoft, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>📖</div>
                    <div style={{ fontFamily: "'Lora', Georgia, serif", fontSize: isMobile ? 16 : 22, fontWeight: 700, color: C.ink }}>
                      Hi, I'm your study tutor.
                    </div>
                  </div>
                  <div style={{ fontSize: isMobile ? 13 : 16, color: C.inkSoft, lineHeight: 1.6 }}>
                    {exam === "life"
                      ? "I know the Massachusetts Life producer exam (Series 16-51) inside and out, from policy types and riders to annuities and taxation. Ask me anything, from quick definitions to tricky concepts. I'll keep it short and clear."
                      : "I know all 10 modules of the Massachusetts Accident & Health exam (Series 16-52) inside and out. Ask me anything, from quick definitions to tricky concepts. I'll keep it short and clear."}
                  </div>
                </div>

                {/* Starter questions */}
                <div style={{ fontSize: 12, fontWeight: 600, color: C.inkSoft, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 10, paddingLeft: 2 }}>
                  Try asking
                </div>
                <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 8 }}>
                  {starters.map((s, i) => (
                    <button key={i} className="starter-btn" onClick={() => send(s)} style={{
                      padding: isMobile ? "10px 12px" : "13px 15px",
                      border: `1px solid ${C.line}`, background: C.card,
                      borderRadius: 12, fontSize: isMobile ? 13 : 14, color: C.ink, cursor: "pointer",
                      textAlign: "left", lineHeight: 1.45,
                      boxShadow: "0 1px 4px rgba(22,36,58,0.05)", transition: "border-color 0.15s, background 0.15s",
                    }}>{s}</button>
                  ))}
                </div>
              </div>
            )}

            {/* Chat messages */}
            <div style={{ maxWidth: 580, width: "100%", margin: "0 auto" }}>
              {messages.map((m, i) => (
                <div key={i} style={{
                  marginBottom: isMobile ? 10 : 16, display: "flex", flexDirection: "column",
                  alignItems: m.role === "user" ? "flex-end" : "flex-start",
                }}>
                  {m.role === "assistant" && (
                    <div style={{ fontSize: 11, fontWeight: 600, color: C.inkSoft, marginBottom: 4, paddingLeft: 4, textTransform: "uppercase", letterSpacing: "0.06em" }}>Tutor</div>
                  )}
                  <div style={{
                    maxWidth: isMobile ? "92%" : "88%",
                    padding: isMobile ? "9px 12px" : "14px 18px",
                    borderRadius: m.role === "user" ? "18px 18px 5px 18px" : "18px 18px 18px 5px",
                    background: m.role === "user" ? C.ink : C.card,
                    color: m.role === "user" ? "#F4F2EA" : C.ink,
                    fontSize: isMobile ? 14 : 16, lineHeight: 1.6,
                    border: m.role === "assistant" ? `1px solid ${C.line}` : "none",
                    boxShadow: "0 1px 6px rgba(22,36,58,0.07)",
                    wordBreak: "break-word", overflowWrap: "anywhere",
                  }}>
                    {m.role === "assistant" ? <Rich text={m.content} /> : m.content}
                  </div>
                </div>
              ))}

              {loading && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.inkSoft, marginBottom: 4, paddingLeft: 4, textTransform: "uppercase", letterSpacing: "0.06em" }}>Tutor</div>
                  <div style={{
                    display: "inline-flex", alignItems: "center", padding: "14px 18px", background: C.card,
                    border: `1px solid ${C.line}`, borderRadius: "20px 20px 20px 6px",
                    boxShadow: "0 1px 6px rgba(22,36,58,0.07)", minWidth: 68,
                  }}><span className="dot" /><span className="dot" /><span className="dot" /></div>
                </div>
              )}
              <div ref={bottomRef} />
            </div>
          </div>

          {/* Input bar */}
          <div style={{ borderTop: `1px solid ${C.line}`, padding: isMobile ? "10px 12px 14px" : "12px 20px 18px", background: C.card, flexShrink: 0 }}>
            <div style={{
              maxWidth: 620, width: "100%", margin: "0 auto", display: "flex", alignItems: "center",
              background: C.paper, borderRadius: 24, border: `1.5px solid ${C.line}`,
              padding: isMobile ? "4px 4px 4px 14px" : "5px 5px 5px 18px",
            }}>
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
                placeholder={exam === "life" ? "Ask about the MA Life exam..." : "Ask about the MA A&H exam..."}
                disabled={loading}
                style={{
                  flex: 1, border: "none", background: "transparent",
                  fontSize: isMobile ? 15 : 16, color: C.ink, outline: "none", padding: "7px 0",
                }}
              />
              <button
                className="send-btn"
                onClick={() => send()}
                disabled={!input.trim() || loading}
                style={{
                  width: 38, height: 38, borderRadius: 18, border: "none",
                  background: (!input.trim() || loading) ? C.line : C.green,
                  color: "#fff", fontSize: 18, cursor: (!input.trim() || loading) ? "default" : "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  flexShrink: 0, transition: "background 0.15s",
                }}>↑</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Main App
    function App() {
      const [apiKey, setApiKey] = useState(() => EMBEDDED_KEY || localStorage.getItem("ma_exam_api_key") || "");
      const [mode, setMode] = useState("chat");
      const [selectedDeck, setSelectedDeck] = useState(null);
      const [exam, setExam] = useState("ah");

      function handleChangeKey() {
        localStorage.removeItem("ma_exam_api_key");
        setApiKey("");
      }

      return (
        <div style={{ position: "fixed", inset: 0, background: C.paper, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {/* Header */}
          <div style={{ background: C.ink, color: "#F4F2EA", padding: isMobile ? "8px 14px" : "13px 20px", flexShrink: 0 }}>
            <div style={{ maxWidth: 620, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontFamily: "'Lora', Georgia, serif", fontSize: isMobile ? 15 : 17, fontWeight: 700, letterSpacing: "-0.01em" }}>
                  Study Buddy <span style={{ color: C.gold }}>·</span> Massachusetts {exam === "life" ? "Life" : "A&H"}
                </div>
                <div style={{ fontSize: 11, color: "rgba(244,242,234,0.4)", marginTop: 2, letterSpacing: "0.05em", textTransform: "uppercase" }}>
                  Prometric Series {exam === "life" ? "16-51" : "16-52"}
                </div>
              </div>
              {apiKey && !EMBEDDED_KEY && (
                <button onClick={handleChangeKey} style={{
                  background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.15)",
                  color: "rgba(244,242,234,0.65)", fontSize: 12, padding: "5px 11px", borderRadius: 8, cursor: "pointer",
                }}>Change key</button>
              )}
            </div>
          </div>

          {!apiKey
            ? <ApiKeyGate onKey={k => { localStorage.setItem("ma_exam_api_key", k); setApiKey(k); }} />
            : (
              <>
                {/* Exam / line selector */}
                <div style={{ background: C.paper, borderBottom: `1px solid ${C.line}`, flexShrink: 0 }}>
                  <div style={{ maxWidth: 620, margin: "0 auto", padding: isMobile ? "7px 12px" : "9px 20px", display: "flex", gap: 7 }}>
                    {[["life", "Life", "16-51"], ["ah", "Accident & Health", "16-52"]].map(([key, label, series]) => (
                      <button key={key} onClick={() => { setExam(key); setMode("chat"); setSelectedDeck(null); }} style={{
                        flex: 1, padding: isMobile ? "7px 8px" : "8px 12px", borderRadius: 9, cursor: "pointer",
                        border: exam === key ? `1.5px solid ${C.green}` : `1px solid ${C.line}`,
                        background: exam === key ? C.greenSoft : C.card,
                        color: exam === key ? C.greenDark : C.inkSoft,
                        fontSize: isMobile ? 12.5 : 13.5, fontWeight: exam === key ? 700 : 500,
                        transition: "all 0.15s",
                      }}>{label}<span style={{ opacity: 0.65, fontSize: "0.82em", fontWeight: 500 }}> · {series}</span></button>
                    ))}
                  </div>
                </div>

                {/* Tabs */}
                <div style={{ background: C.card, borderBottom: `1px solid ${C.line}`, flexShrink: 0 }}>
                  <div style={{ maxWidth: 620, margin: "0 auto", display: "flex" }}>
                    {[["chat", "Ask the Tutor"], ["cards", "Flashcards"]].map(([key, label]) => (
                      <button key={key} onClick={() => { setMode(key); setSelectedDeck(null); }} style={{
                        flex: 1, padding: isMobile ? "9px 12px" : "12px 16px", border: "none", background: "transparent",
                        color: mode === key ? C.green : C.inkSoft,
                        fontWeight: mode === key ? 700 : 500, fontSize: isMobile ? 13 : 14, cursor: "pointer",
                        borderBottom: mode === key ? `2.5px solid ${C.green}` : "2.5px solid transparent",
                        transition: "color 0.15s, border-color 0.15s",
                      }}>{label}</button>
                    ))}
                  </div>
                </div>

                {/* Content */}
                <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", overflowX: "hidden", overflowY: mode === "chat" ? "hidden" : "auto" }}>
                  {mode === "chat"
                    ? <ChatMode apiKey={apiKey} systemPrompt={exam === "life" ? SYSTEM_PROMPT_LIFE : SYSTEM_PROMPT_AH} starters={exam === "life" ? STARTERS_LIFE : STARTERS_AH} exam={exam} />
                    : selectedDeck
                      ? <FlashcardGame deck={selectedDeck} onExit={() => setSelectedDeck(null)} />
                      : <DeckPicker decks={exam === "life" ? LIFE_DECKS : DECKS} onSelect={d => setSelectedDeck(d)} />
                  }
                </div>
              </>
            )
          }
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    var _src = document.getElementById("app-src").textContent;
    var _out = Babel.transform(_src, { presets: [["react", { runtime: "classic" }]] });
    new Function(_out.code)();
  </script>
</body>
</html>
